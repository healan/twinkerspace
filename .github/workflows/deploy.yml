name: Deploy TwinkerSpace

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script_stop: true

          script: |

            echo "========================================="
            echo " TwinkerSpace Deployment Started"
            echo "========================================="

            cd ~/twinkerspace

            echo ""
            echo " Pull latest source..."
            git pull origin main

            ########################################
            # Backend
            ########################################

            echo ""
            echo " Installing Backend..."

            cd server

            npm ci || npm install

            echo ""
            echo " Restarting API..."

            pm2 restart twinkerspace-api || pm2 start index.js --name twinkerspace-api

            ########################################
            # Frontend
            ########################################

            echo ""
            echo " Building Frontend..."

            cd ../web

            npm ci || npm install

            npm run build

            echo ""
            echo " Deploying React build..."

            sudo rm -rf /var/www/twinkerspace/*

            sudo cp -r dist/* /var/www/twinkerspace/

            ########################################
            # Nginx
            ########################################

            echo ""
            echo " Checking Nginx..."

            sudo nginx -t

            sudo systemctl reload nginx

            ########################################
            # Health Check
            ########################################

            echo ""
            echo " Waiting for server..."

            sleep 5

            echo ""
            echo " Frontend Health Check..."

            STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://twinkerspace.duckdns.org)

            echo "Frontend Status : $STATUS"

            if [ "$STATUS" != "200" ]; then
              echo "❌ Frontend Health Check Failed"
              exit 1
            fi

            echo ""
            echo "🔌 API Health Check..."

            STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://twinkerspace.duckdns.org/api/health)

            echo "API Status : $STATUS"

            if [ "$STATUS" != "200" ]; then
              echo "❌ API Health Check Failed"
              exit 1
            fi

            echo ""
            echo "========================================="
            echo "✅ Deployment Successful!"
            echo "========================================="